<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | BEEREDDY AGENCY</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#003b95,#ff7b00);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:35px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.login-box h2{
text-align:center;
margin-bottom:25px;
color:#003b95;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

.login-box button{
width:100%;
padding:12px;
background:#003b95;
color:#fff;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#ff7b00;
}

.back-home{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#003b95;
font-weight:600;
}

.back-home:hover{
color:#ff7b00;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="index.html" class="back-home">← Back to Home</a>

</div>

</body>
</html>
